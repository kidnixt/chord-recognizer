<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Chord Recognizer</title>
  <link rel="stylesheet" href="style.css">
  <style>
    canvas {
      border: 1px solid #ccc;
      margin-top: 10px;
    }
  </style>
</head>
<body>
  <div class="app-container">
    <header class="app-header">
      <h1>🎸 Chord Recognizer</h1>
    </header>

    <main class="app-main">
      <div class="controls">
        <button id="start" class="btn">Start Listening</button>
        <button id="stop" class="btn">Stop Listening</button>
      </div>

      <div class="sliders-container">
        <div class="slider-group">
          <label for="thresholdSlider">Detection Threshold</label>
          <span class="slider-value" id="thresholdValue">0.40</span>
          <input type="range" id="thresholdSlider" min="0.1" max="0.9" step="0.01" value="0.40">
        </div>
        <div class="slider-group">
          <label for="gateSlider">Volume Gate</label>
          <span class="slider-value" id="gateValue">0.015</span>
          <input type="range" id="gateSlider" min="0.001" max="0.1" step="0.001" value="0.015">
        </div>
      </div>

      <div class="visualizer">
  <canvas id="spectrum" width="800" height="400"></canvas>
</div>

<div class="output">
  <div id="output-content">
    <p>Press Start to begin...</p>
  </div>
</div>
    </main>
  </div>

  <script type="module" src="/src/main.ts"></script>
</body>
</html>
